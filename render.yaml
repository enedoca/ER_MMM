services:
  - type: web
    name: er-stats-app
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ETERNAL_RETURN_API_KEY
        sync: false
